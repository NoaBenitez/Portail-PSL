<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Documentation WIPSOS — PSL</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Bouton menu mobile -->
  <button id="menuToggle" class="menu-toggle" aria-label="Ouvrir le menu">
    <span></span><span></span><span></span>
  </button>

  <div class="layout">
    <!-- MENU GAUCHE -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-logo"><img src="logopsl.png" alt="PSL" /></div>
        <div class="brand-text">
          <span class="brand-title">WIPSOS</span>
          <span class="brand-sub">Documentation</span>
        </div>
        <img src="WIPSOS.png" class="brand-wipsos" alt="WIPSOS" />
      </div>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Rechercher…" autocomplete="off" />
      </div>

      <nav class="menu" id="menu" aria-label="Catégories de formation"></nav>

      <div class="sidebar-footer">
        © <span id="year"></span> PSL — WIPSOS
      </div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <!-- CONTENU DROITE -->
    <main class="content" id="content">
      <article class="doc" id="doc"></article>
    </main>
  </div>

  <script src="js/content.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
